services:
  - type: web
    name: annual-report-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: https://ws-nitmov1zmsy9pqre.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      - key: QWEN_MODEL
        value: qwen-plus
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: CORS_ALLOW_ORIGINS
        sync: false
